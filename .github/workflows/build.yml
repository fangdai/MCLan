name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev extras only — no runtime deps)
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: CLI smoke (offline help + arg parsing)
        run: |
          python -m mclan --version
          python -m mclan up --help
